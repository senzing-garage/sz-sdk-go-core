name: Make go tag

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions: {}

jobs:
  make-go-tag:
    name: Make a vM.m.P tag
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Make go version tag
        uses: senzing-factory/github-action-make-go-tag@v2
        with:
          actor: ${{ secrets.SENZING_GITHUB_ACTOR }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          gpg_private_key: ${{ secrets.SENZING_GITHUB_GPG_PRIVATE_KEY }}
          gpg_passphrase: ${{ secrets.SENZING_GITHUB_GPG_PASSPHRASE }}

      - name: Notify Slack on failure
        if: failure() || cancelled()
        uses: senzing-factory/build-resources/slack-failure-notification@v4
        with:
          job-status: ${{ job.status }}
          slack-channel: ${{ secrets.SLACK_CHANNEL }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
